<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#c0c0c0"/>
    </linearGradient>
    <linearGradient id="capeGrad" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#1e1e1e"/>
    </linearGradient>
    <linearGradient id="crestGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#aaaaaa" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bgGrad)"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>

  <!-- Cape / mantle — dark flowing shape -->
  <path d="M148 310 Q110 390 95 495 Q175 455 256 448 Q337 455 417 495
           Q402 390 364 310 Q325 358 256 365 Q187 358 148 310 Z"
        fill="url(#capeGrad)" opacity="0.9"/>
  <!-- Cape edge highlight -->
  <path d="M148 310 Q187 358 256 365 Q325 358 364 310"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- === SPARTAN HELMET === -->
  <!-- Helmet dome -->
  <path d="M172 200 Q168 122 200 92 Q225 68 256 64 Q287 68 312 92
           Q344 122 340 200 L332 252 Q305 272 256 278 Q207 272 180 252 Z"
        fill="url(#helmetGrad)" filter="url(#shadow)"/>

  <!-- Helmet shadow/depth inside dome -->
  <path d="M200 92 Q225 68 256 64 Q287 68 312 92 Q296 84 256 82 Q216 84 200 92 Z"
        fill="rgba(0,0,0,0.15)"/>

  <!-- Cheek guard LEFT -->
  <path d="M172 200 L168 262 Q170 290 186 304 Q200 314 218 308 L226 274
           Q208 268 200 250 L180 252 Z"
        fill="url(#helmetGrad)"/>
  <!-- Cheek guard RIGHT -->
  <path d="M340 200 L344 262 Q342 290 326 304 Q312 314 294 308 L286 274
           Q304 268 312 250 L332 252 Z"
        fill="url(#helmetGrad)"/>

  <!-- Nose bridge (vertical bar) -->
  <rect x="244" y="186" width="24" height="88" rx="6"
        fill="#b0b0b0"/>
  <rect x="248" y="186" width="8" height="88" rx="3"
        fill="rgba(255,255,255,0.4)"/>

  <!-- Eye visor LEFT -->
  <path d="M180 194 Q182 186 238 183 L240 203 Q184 206 180 194 Z"
        fill="#111111" rx="4"/>
  <!-- Eye visor RIGHT -->
  <path d="M276 183 Q332 186 334 194 Q332 206 276 203 Z"
        fill="#111111"/>
  <!-- Visor highlight lines -->
  <line x1="186" y1="191" x2="236" y2="189" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <line x1="276" y1="189" x2="326" y2="191" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

  <!-- === HELMET CREST / PLUME === -->
  <!-- Crest base plate -->
  <rect x="238" y="55" width="36" height="20" rx="7"
        fill="#cccccc"/>

  <!-- Plume feathers — sweeping right/back -->
  <path d="M274 64 Q350 28 440 18 Q420 46 386 60 Q354 73 316 78 Q294 78 274 70 Z"
        fill="url(#crestGrad)"/>
  <path d="M274 69 Q354 40 448 32 Q426 60 390 72 Q356 83 318 86 Q296 84 274 76 Z"
        fill="rgba(200,200,200,0.65)"/>
  <path d="M274 74 Q358 54 452 48 Q428 76 392 86 Q358 95 320 96 Q297 93 274 82 Z"
        fill="rgba(160,160,160,0.4)"/>

  <!-- Chin guard -->
  <path d="M206 302 Q228 316 256 319 Q284 316 306 302 L300 322
           Q278 334 256 336 Q234 334 212 322 Z"
        fill="#cccccc"/>

  <!-- === FC 26 TEXT === -->
  <!-- Separator line -->
  <line x1="96" y1="428" x2="416" y2="428"
        stroke="rgba(255,255,255,0.18)" stroke-width="1"/>

  <text x="256" y="480"
        font-family="'Arial Narrow','Arial',sans-serif"
        font-size="78"
        font-weight="900"
        font-style="italic"
        text-anchor="middle"
        fill="#ffffff"
        letter-spacing="6"
        opacity="0.95">FC 26</text>
</svg>
